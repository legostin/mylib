name: release

# Triggers a multi-platform build that bundles MyLib for macOS (Apple Silicon
# + Intel), Windows x64, and Linux x64. Either push a `v*` tag (the normal
# release flow) or fire the workflow manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Publish as draft release"
        type: boolean
        default: true

permissions:
  # tauri-action needs `contents: write` to create the GitHub Release and
  # upload artifacts.
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — separate jobs so we end up with two .dmg files. Building a
          # universal binary on one runner is possible but adds ~10 min and
          # bloats the .dmg; two jobs in parallel is faster.
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            label: macOS arm64
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            label: macOS x86_64
          - platform: ubuntu-22.04
            args: ""
            label: Linux x86_64
          - platform: windows-latest
            args: ""
            label: Windows x86_64

    runs-on: ${{ matrix.platform }}
    name: build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS jobs may need a non-default target (aarch64/x86_64).
          targets: ${{ contains(matrix.args, 'aarch64-apple-darwin') && 'aarch64-apple-darwin' || (contains(matrix.args, 'x86_64-apple-darwin') && 'x86_64-apple-darwin' || '') }}

      - name: Cache cargo registry + target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          # Bust the cache when Cargo.lock or rust-toolchain changes.
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-{1}', '0.2.0', github.run_number) }}
          releaseName: "MyLib ${{ github.ref_type == 'tag' && github.ref_name || format('build {0}', github.run_number) }}"
          releaseBody: |
            Автосборка из коммита ${{ github.sha }}.
            Скачайте инсталлятор для вашей платформы.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          args: ${{ matrix.args }}
