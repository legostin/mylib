name: ci

# Lightweight checks on every push / PR: type-check the frontend and run
# `cargo check` + `cargo test --lib` for the Rust backend. We don't bundle
# here — the release workflow handles that on tags.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc -b --force

  backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux build deps
        # `cargo check` for Tauri's webview crate needs the WebKit headers
        # even if we don't actually link the binary.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev
      - working-directory: src-tauri
        run: cargo check --all-targets
      - working-directory: src-tauri
        run: cargo test --lib
