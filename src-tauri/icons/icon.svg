<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="pageL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded-square background. iOS/macOS already mask their own corners,
       but a generous radius lets the icon look right on Linux/Windows too. -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Decorative diagonal glow in the upper-left so the flat gradient
       doesn't read as a featureless slab at small sizes. -->
  <circle cx="240" cy="220" r="380" fill="#ffffff" opacity="0.08"/>

  <!-- Open book group -->
  <g filter="url(#softShadow)">
    <!-- Left page -->
    <path d="
      M 248 312
      Q 248 296 268 290
      L 504 252
      L 504 762
      L 268 730
      Q 248 728 248 712
      Z
    " fill="url(#pageL)"/>

    <!-- Right page -->
    <path d="
      M 776 312
      Q 776 296 756 290
      L 520 252
      L 520 762
      L 756 730
      Q 776 728 776 712
      Z
    " fill="url(#pageR)"/>

    <!-- Spine — dark crease in the middle giving the open-book feel -->
    <path d="M 504 252 L 504 762 L 520 762 L 520 252 Z" fill="#1e293b" opacity="0.18"/>
  </g>

  <!-- Text lines: short bars suggesting paragraphs. Lengths vary so the
       page doesn't look like a barcode. Bars use rounded ends for warmth. -->
  <g fill="#94a3b8">
    <!-- Left page -->
    <rect x="296" y="368" width="160" height="14" rx="7"/>
    <rect x="296" y="410" width="180" height="14" rx="7"/>
    <rect x="296" y="452" width="150" height="14" rx="7"/>
    <rect x="296" y="494" width="180" height="14" rx="7"/>
    <rect x="296" y="536" width="130" height="14" rx="7"/>
    <rect x="296" y="578" width="170" height="14" rx="7"/>
    <rect x="296" y="620" width="110" height="14" rx="7"/>

    <!-- Right page -->
    <rect x="548" y="368" width="170" height="14" rx="7"/>
    <rect x="548" y="410" width="180" height="14" rx="7"/>
    <rect x="548" y="452" width="160" height="14" rx="7"/>
    <rect x="548" y="494" width="180" height="14" rx="7"/>
    <rect x="548" y="536" width="140" height="14" rx="7"/>
    <rect x="548" y="578" width="170" height="14" rx="7"/>
    <rect x="548" y="620" width="120" height="14" rx="7"/>
  </g>

  <!-- Bookmark ribbon — single splash of warm colour that keeps the icon
       recognisable even when shrunk to 32×32. -->
  <g>
    <path d="
      M 632 252
      L 632 460
      L 672 432
      L 712 460
      L 712 252
      Z
    " fill="#ef4444"/>
    <!-- Subtle inner highlight on the ribbon -->
    <path d="
      M 632 252
      L 632 280
      L 712 280
      L 712 252
      Z
    " fill="#ffffff" opacity="0.18"/>
  </g>
</svg>
